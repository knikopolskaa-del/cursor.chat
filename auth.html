<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Marchess</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Декоративные шахматные фигуры на фоне страницы -->
  <!-- pointer-events: none — не мешают кликам, z-index: 0 — всегда позади формы -->
  <div class="chess-deco" aria-hidden="true">
    <span class="chess-deco__piece chess-deco__piece--tl">♜</span>
    <span class="chess-deco__piece chess-deco__piece--tr">♞</span>
    <span class="chess-deco__piece chess-deco__piece--bl">♝</span>
    <span class="chess-deco__piece chess-deco__piece--br">♛</span>
    <span class="chess-deco__piece chess-deco__piece--ml">♙</span>
    <span class="chess-deco__piece chess-deco__piece--mr">♔</span>
  </div>

  <div class="page page--auth">

    <header class="header">
      <h1 class="title">Marchess</h1>
      <p class="subtitle">Столетние традиции, острые комбинации и живые эмоции —<br>побеждай друзей там, где решает каждый ход</p>
    </header>

    <main class="auth-wrap">
      <div class="auth-card">

        <!-- Переключатель "Вход / Регистрация" -->
        <div class="auth-tabs">
          <button id="tab-login"    class="auth-tab active" onclick="showTab('login')">Вход</button>
          <button id="tab-register" class="auth-tab"        onclick="showTab('register')">Регистрация</button>
        </div>

        <!-- ── Форма входа ────────────────────────────────────────────── -->
        <form id="form-login" class="auth-form" onsubmit="handleLogin(event)" autocomplete="off">
          <div class="field">
            <label class="field-label" for="login-username">Никнейм</label>
            <input
              id="login-username"
              class="field-input"
              type="text"
              placeholder="Введите никнейм"
              autocomplete="off"
              readonly
            >
          </div>

          <div class="field">
            <label class="field-label" for="login-password">Пароль</label>
            <div class="field-input-wrap">
              <input
                id="login-password"
                class="field-input"
                type="password"
                placeholder="Введите пароль"
                autocomplete="off"
                readonly
              >
              <!-- Кнопка скрыта пока поле пустое; управляется из auth.js -->
              <button type="button" class="eye-btn hidden" id="login-eye" aria-label="Показать пароль" tabindex="-1">
                <!-- Открытый глаз: пароль виден. По умолчанию скрыт -->
                <svg class="eye-icon eye-icon--open hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                <!-- Закрытый глаз: пароль скрыт. По умолчанию виден -->
                <svg class="eye-icon eye-icon--closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 Q12 17 22 9"/><line x1="7" y1="12.5" x2="6" y2="16.5"/><line x1="12" y1="13.5" x2="12" y2="17.5"/><line x1="17" y1="12.5" x2="18" y2="16.5"/></svg>
              </button>
            </div>
          </div>

          <!-- Сюда выводится сообщение об ошибке -->
          <div id="login-error" class="auth-error hidden"></div>

          <button type="submit" id="login-submit" class="btn btn-primary">Войти</button>
        </form>

        <!-- ── Форма регистрации ──────────────────────────────────────── -->
        <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
          <div class="field">
            <label class="field-label" for="reg-username">Никнейм</label>
            <input
              id="reg-username"
              class="field-input"
              type="text"
              placeholder="chess_player"
              autocomplete="username"
              required
            >
          </div>

          <div class="field">
            <label class="field-label" for="reg-password">Пароль</label>
            <div class="field-input-wrap">
              <input
                id="reg-password"
                class="field-input"
                type="password"
                placeholder="минимум 6 символов"
                autocomplete="new-password"
                required
              >
              <button type="button" class="eye-btn hidden" id="reg-eye" aria-label="Показать пароль" tabindex="-1">
                <svg class="eye-icon eye-icon--open hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-icon eye-icon--closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9 Q12 17 22 9"/><line x1="7" y1="12.5" x2="6" y2="16.5"/><line x1="12" y1="13.5" x2="12" y2="17.5"/><line x1="17" y1="12.5" x2="18" y2="16.5"/></svg>
              </button>
            </div>
          </div>

          <div id="register-error" class="auth-error hidden"></div>

          <button type="submit" id="register-submit" class="btn btn-primary">Создать аккаунт</button>
        </form>

      </div>
    </main>


  </div>

  <script src="auth.js"></script>
</body>
</html>
