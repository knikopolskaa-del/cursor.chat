<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анализ партии — Шахматы</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="header header--analysis">
      <button class="back-btn btn btn-secondary" onclick="window.location.href='/'">← Назад</button>
      <h1 class="title" style="font-size:1.4rem; margin:0;">Анализ партии</h1>
      <div id="user-bar" class="user-bar hidden">
        <span class="user-bar__name" id="user-bar-name"></span>
        <button class="user-bar__logout btn btn-secondary" onclick="logout()">Выйти</button>
      </div>
    </header>

    <main class="main main--analysis">

      <!-- Центральная колонка: доска + кнопка перевернуть -->
      <div class="board-column">
        <section class="board-section">
          <div id="chess-board" class="board" aria-label="Шахматная доска"></div>
        </section>
        <div class="controls-card">
          <div class="btn-grid">
            <button id="flip-board-btn" class="btn btn-secondary">↻ Перевернуть</button>
          </div>
        </div>
      </div>

      <!-- Правая колонка: нотация со стрелками + кнопки -->
      <div class="notation-column">
        <div class="notation-card">
          <div class="notation-nav">
            <button id="notation-first" class="notation-nav-btn" aria-label="К первому ходу">«</button>
            <button id="notation-prev"  class="notation-nav-btn" aria-label="Предыдущий ход">‹</button>
            <button id="notation-next"  class="notation-nav-btn" aria-label="Следующий ход">›</button>
            <button id="notation-last"  class="notation-nav-btn" aria-label="К последнему ходу">»</button>
          </div>
          <div id="notation-body" class="notation-body">
            <span class="notation-empty">Загрузка...</span>
          </div>
        </div>
        <div class="notation-actions">
          <button id="new-game-btn" class="btn btn-primary">Новая партия</button>
        </div>
      </div>

    </main>
  </div>

  <script src="analysis.js"></script>

  <script>
    fetch('/me')
      .then(res => {
        if (!res.ok) {
          window.location.href = '/auth.html';
          return null;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;
        document.getElementById('user-bar-name').textContent = '♟ ' + data.username;
        document.getElementById('user-bar').classList.remove('hidden');
      })
      .catch(() => {
        console.warn('Сервер недоступен.');
      });

    function logout() {
      fetch('/logout', { method: 'POST' })
        .then(() => { window.location.href = '/auth.html'; });
    }
  </script>
</body>
</html>
