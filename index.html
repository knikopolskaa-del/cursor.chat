<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мини-шахматы</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <!-- Строка с именем вошедшего пользователя и кнопкой выхода -->
      <!-- Заполняется скриптом внизу страницы после проверки /me -->
      <div id="user-bar" class="user-bar hidden">
        <span class="user-bar__name" id="user-bar-name"></span>
        <button class="user-bar__logout btn btn-secondary" onclick="logout()">Выйти</button>
      </div>
      <h1 class="title">Шахматы</h1>
      <p class="subtitle">Играй с другом за одним устройством</p>
    </header>

    <main class="main">

      <!-- Левая панель: статус хода + подсказки -->
      <aside class="left-panel">
        <div class="status-card">
          <div class="status-header">
            <div id="turn-indicator" class="turn-indicator white">♔</div>
            <div class="status-title">
              <h3>Ход</h3>
              <div id="player-name" class="player-name">Белые</div>
            </div>
          </div>
          <div id="game-state" class="game-state normal">Новая партия</div>
        </div>

        <div class="info-card">
          <div class="info-title">Как играть</div>
          <ul class="info-list">
            <li>Нажми на фигуру, чтобы выбрать</li>
            <li>Нажми на подсвеченную клетку для хода</li>
            <li>Круг — возможный ход, кольцо — взятие</li>
          </ul>
        </div>
      </aside>

      <!-- Центральная колонка: доска + кнопки под ней -->
      <div class="board-column">
        <section class="board-section">
          <div id="chess-board" class="board" aria-label="Шахматная доска"></div>
        </section>

        <div class="controls-card">
          <div class="btn-grid">
            <button id="new-game-btn"   class="btn btn-primary">Новая партия</button>
            <button id="flip-board-btn" class="btn btn-secondary">↻ Перевернуть</button>
            <button id="resign-btn"     class="btn btn-danger">Сдаться</button>
            <button id="draw-btn"       class="btn btn-secondary">Ничья</button>
          </div>
        </div>
      </div>

      <!-- Правая колонка: нотация той же ширины что и доска -->
      <div class="notation-card">
        <div class="notation-nav">
          <button id="notation-first" class="notation-nav-btn" aria-label="К первому ходу">«</button>
          <button id="notation-prev"  class="notation-nav-btn" aria-label="Прокрутить вверх">‹</button>
          <button id="notation-next"  class="notation-nav-btn" aria-label="Прокрутить вниз">›</button>
          <button id="notation-last"  class="notation-nav-btn" aria-label="К последнему ходу">»</button>
        </div>
        <div id="notation-body" class="notation-body">
          <span class="notation-empty">Ходов пока нет</span>
        </div>
      </div>

    </main>

    <footer class="footer">
      <span>Играй без регистрации и SMS</span>
    </footer>
  </div>

  <script src="chess.js"></script>
  <script src="ui.js"></script>

  <script>
    // Проверяем авторизацию при каждой загрузке главной страницы.
    // Если пользователь не вошёл — отправляем его на страницу входа.
    fetch('/me')
      .then(res => {
        if (!res.ok) {
          // Сессия не найдена → перенаправляем на форму входа
          window.location.href = '/auth.html';
          return null;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;
        // Показываем имя пользователя в шапке
        document.getElementById('user-bar-name').textContent = '♟ ' + data.username;
        document.getElementById('user-bar').classList.remove('hidden');
      })
      .catch(() => {
        // Если сервер не отвечает — показываем предупреждение,
        // но не блокируем страницу (удобно при разработке без сервера)
        console.warn('Сервер недоступен. Аутентификация отключена.');
      });

    // Выход из системы: удаляем сессию на сервере, переходим на страницу входа
    function logout() {
      fetch('/logout', { method: 'POST' })
        .then(() => { window.location.href = '/auth.html'; });
    }
  </script>
</body>
</html>
